const RL={S:'🏆 Rang S',A:'⭐ Rang A',B:'✅ Rang B',C:'📈 Rang C',D:'⚠️ Rang D'};
const RC={S:'#1D9E75',A:'#378ADD',B:'#7F77DD',C:'#BA7517',D:'#E24B4A'};
const PC=['#1D9E75','#378ADD','#7F77DD','#D85A30','#BA7517','#E24B4A','#3B6D11','#533AB7','#D4537E'];
const AVC=[['#dcfff2','#0a6b45'],['#dceeff','#0a4d8c'],['#ede8ff','#3b2a8c'],['#fff3dc','#7a4e00'],['#ffe8e8','#8c1a1a'],['#e8f5e9','#1b5e20']];
const MLIST=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

function rank(s){return s>=95?'S':s>=80?'A':s>=65?'B':s>=50?'C':'D';}
function col(s){return s>=95?'#1D9E75':s>=80?'#378ADD':s>=65?'#7F77DD':s>=50?'#BA7517':'#E24B4A';}
function avc(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%AVC.length;return AVC[h];}
function ini(n){const p=n.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function uid(){return'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function sc(perf,qual,pres,eng,avert){
  if(!perf&&!qual)return 0;
  const r=(perf/100*.4)+(qual/100*.3)+(pres/100*.2)+((eng/5)*.1);
  const m=avert>=3?0:1-avert*.1;
  return Math.round(r*m*1000)/10;
}

function anciennete(dateEntree) {
  if(!dateEntree) return '—';
  const d = new Date(dateEntree + '-01');
  const now = new Date();
  const mois = (now.getFullYear()-d.getFullYear())*12 + (now.getMonth()-d.getMonth());
  if(mois < 1) return 'Nouveau';
  if(mois < 12) return mois + ' mois';
  const ans = Math.floor(mois/12);
  const m = mois%12;
  return ans + ' an' + (ans>1?'s':'') + (m>0?' '+m+' mois':'');
}

function dureeEntreMois(debut, fin) {
  const parse = s => {
    const [mo, yr] = s.split(' ');
    return +('20'+yr)*12 + MLIST.indexOf(mo);
  };
  const d = parse(debut);
  const f = fin ? parse(fin) : (new Date().getFullYear()*12 + new Date().getMonth());
  const diff = f - d + 1;
  if(diff <= 0) return '1 mois';
  if(diff < 12) return diff + ' mois';
  const ans = Math.floor(diff/12);
  const m = diff%12;
  return ans + ' an' + (ans>1?'s':'') + (m>0?' '+m+' mois':'');
}

const DEF = {
  projects:['AEC','EURO-PARE-BRISE','JAPHY','ALTERNANCE','VITALIVET','EDEN-ENERGIE','WALTER SANTÉ','ENERIX'],
  months:['Oct 25','Nov 25','Déc 25','Jan 26','Fév 26','Mar 26'],
  agents:[
    {id:'a1',name:'Larbi Yanis',proj:'JAPHY',active:true,dateEntree:'2019-02',projHistory:[{proj:'JAPHY',debut:'Oct 25',fin:null}],scores:{'Oct 25':{perf:140,qual:56,pres:100,eng:5,avert:0},'Mar 26':{perf:140,qual:56,pres:100,eng:5,avert:0}}},
    {id:'a2',name:'Atek Tania',proj:'JAPHY',active:true,dateEntree:'2020-06',projHistory:[{proj:'JAPHY',debut:'Oct 25',fin:null}],scores:{'Oct 25':{perf:120,qual:100,pres:100,eng:5,avert:0}}},
    {id:'a3',name:'Mokrane Samia',proj:'JAPHY',active:true,dateEntree:'2021-03',projHistory:[{proj:'JAPHY',debut:'Oct 25',fin:null}],scores:{'Oct 25':{perf:111,qual:85,pres:100,eng:5,avert:0}}}
  ],
  teamLeaders: [],
  comptes: [{user:'admin',pass:'1234',role:'patron',name:'Directeur'}],
  calendar: [],
  archives: { months: [], snapshots: [] },
  comments: {}
};

let DATA = JSON.parse(JSON.stringify(DEF));
let currentMonth = '';
let currentFilter = 'ALL';
let charts = {};
let USER = null;

// Initialisation de la session et des écoutes Firebase
window.addEventListener('DOMContentLoaded', () => {
  const cachedUser = localStorage.getItem('altius_user');
  if(cachedUser) {
    USER = JSON.parse(cachedUser);
    document.getElementById('loginOverlay').style.display = 'none';
    applyRolePermissions();
  }
  
  onSnapshot(REF, (snap) => {
    const b = document.getElementById('syncbadge');
    if(!snap.exists()) {
      setDoc(REF, DEF);
      b.className = "sync-badge sync-ok"; b.textContent = "⚙️ Initialisé";
      return;
    }
    DATA = snap.data();
    // Migrations / Nettoyages si champs inexistants
    if(!DATA.teamLeaders) DATA.teamLeaders = [];
    if(!DATA.comptes) DATA.comptes = [{user:'admin',pass:'1234',role:'patron',name:'Directeur'}];
    if(!DATA.calendar) DATA.calendar = [];
    if(!DATA.archives) DATA.archives = { months: [], snapshots: [] };
    if(!DATA.comments) DATA.comments = {};

    if(!currentMonth && DATA.months.length > 0) {
      currentMonth = DATA.months[DATA.months.length - 1];
    }
    
    b.className = "sync-badge sync-ok"; b.textContent = "🟢 Synchronisé";
    document.getElementById('subtitle').textContent = `Mois d'analyse : ${currentMonth || 'Aucun'}`;
    initFilters();
    syncSelects();
    renderAll();
  }, (err) => {
    const b = document.getElementById('syncbadge');
    b.className = "sync-badge sync-err"; b.textContent = "🔴 Erreur Firebase";
    console.error(err);
  });
});

window.checkLogin = function() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginErr');
  
  const match = DATA.comptes.find(c => c.user === u && c.pass === p);
  if(match) {
    USER = match;
    localStorage.setItem('altius_user', JSON.stringify(USER));
    document.getElementById('loginOverlay').style.display = 'none';
    err.style.display = 'none';
    applyRolePermissions();
    renderAll();
  } else {
    err.style.display = 'block';
    err.textContent = "Identifiants incorrects.";
  }
};

window.logout = function() {
  USER = null;
  localStorage.removeItem('altius_user');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginOverlay').style.display = 'flex';
};

function applyRolePermissions() {
  if(!USER) return;
  const isPatron = USER.role === 'patron';
  document.getElementById('comptes-tab').style.display = isPatron ? 'block' : 'none';
  const addEvalBtn = document.getElementById('add-eval-btn');
  if(addEvalBtn) {
    addEvalBtn.style.display = (USER.role === 'patron' || USER.role === 'qualite') ? 'block' : 'none';
  }
}

function initFilters() {
  const container = document.getElementById('rankfilter');
  if(!container) return;
  let html = `<button class="fb ${currentFilter==='ALL'?'on':''}" onclick="window.setFilter('ALL')">Tous</button>`;
  for(let key in RL) {
    html += `<button class="fb ${currentFilter===key?'on':''}" onclick="window.setFilter('${key}')">${RL[key]}</button>`;
  }
  container.innerHTML = html;
}

window.setFilter = function(f) {
  currentFilter = f;
  initFilters();
  renderAgents();
};

function syncSelects() {
  const msel = document.getElementById('msel');
  const psel = document.getElementById('psel');
  if(!msel || !psel) return;
  
  const prevM = msel.value;
  const prevP = psel.value;
  
  msel.innerHTML = DATA.months.map(m => `<option value="${m}">${m}</option>`).join('');
  psel.innerHTML = DATA.projects.map(p => `<option value="${p}">${p}</option>`).join('');
  
  if(DATA.months.includes(prevM)) msel.value = prevM;
  if(DATA.projects.includes(prevP)) psel.value = prevP;
}

function renderAll() {
  renderOverview();
  renderAgents();

  renderTrendChart();
  renderProjets();
  window.renderHist();
  renderTeamLeaders();
  renderComptes();
  renderCalendar();

}

// NAVIGATION
window.goPage = function(id, btn) {

  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  document.getElementById('pg-' + id).classList.add('on');
  btn.classList.add('on');

// VUES ET COMPOSANTS GRAPHIQUES
function renderOverview() {
  const activeAgents = DATA.agents.filter(a => a.active);
  let totalScore = 0, scoredCount = 0, countD = 0;
  let distribution = {S:0,A:0,B:0,C:0,D:0};
  let alertsHtml = '';

  activeAgents.forEach(a => {
    const s = a.scores && a.scores[currentMonth];
    if(s) {
      const value = sc(s.perf, s.qual, s.pres, s.eng, s.avert);
      totalScore += value;
      scoredCount++;
      const r = rank(value);
      distribution[r]++;
      if(r === 'D') {
        countD++;
        alertsHtml += `
          <div class="alert-d">
            <div class="alert-d-icon">⚠️</div>
            <div class="alert-d-info">
              <div class="alert-d-name">${a.name}</div>
              <div class="alert-d-detail">Projet: ${a.proj} — Perf: ${s.perf}%, Qualité: ${s.qual}%, Avertissements: ${s.avert}</div>
            </div>
            <div class="alert-d-score">${value} pts</div>
          </div>`;
      }
    }
  });

  const avg = scoredCount ? Math.round(totalScore / scoredCount * 10) / 10 : 0;
  
  const kgrid = document.getElementById('kgrid');
  if(kgrid) {
    kgrid.innerHTML = `
      <div class="kcard accent"><div class="klabel">Mois courant</div><div class="kval" style="font-size:20px;margin-top:6px">${currentMonth || 'Aucun'}</div></div>
      <div class="kcard accent"><div class="klabel">Moyenne générale</div><div class="kval" style="color:${col(avg)}">${avg}</div><div class="ksub">Sur ${scoredCount} calculs</div></div>
      <div class="kcard accent"><div class="klabel">Agents actifs</div><div class="kval">${activeAgents.length}</div><div class="ksub">Inscrits au planning</div></div>
      <div class="kcard accent"><div class="klabel">Alerte(s) Critique(s)</div><div class="kval" style="color:${countD>0?'var(--red)':'var(--green)'}">${countD}</div><div class="ksub">Agents en Rang D</div></div>
    `;
  }

  const alertSec = document.getElementById('alertes-section');
  if(alertSec) {
    alertSec.innerHTML = countD > 0 ? `<div class="stitle" style="color:var(--red)">⚠️ Alertes d'accompagnement requises</div>` + alertsHtml : '';
  }

  // TOP 3
  const scoredList = activeAgents.map(a => {
    const s = a.scores && a.scores[currentMonth];
    return { name: a.name, proj: a.proj, val: s ? sc(s.perf,s.qual,s.pres,s.eng,s.avert) : -1 };
  }).filter(x => x.val >= 0).sort((a,b) => b.val - a.val).slice(0,3);

  const tgrid = document.getElementById('top3grid');
  if(tgrid) {
    const medals = ['🥇','🥈','🥉'];
    const classes = ['gold','silver','bronze'];
    tgrid.innerHTML = scoredList.length ? scoredList.map((x,i) => `
      <div class="top3-card ${classes[i]}">
        <div class="top3-medal">${medals[i]}</div>
        <div class="top3-info">
          <div class="top3-name">${x.name}</div>
          <div class="top3-proj">${x.proj}</div>
        </div>
        <div class="top3-score">${x.val}</div>
      </div>
    `).join('') : '<div style="color:var(--muted);font-size:13px;padding:8px">Aucun score disponible ce mois-ci.</div>';
  }

  // CHARTS
  renderOverviewCharts(distribution);
}

function renderOverviewCharts(dist) {
  const donutCtx = document.getElementById('donut');
  const barCtx = document.getElementById('projbar');
  if(!donutCtx || !barCtx) return;

  if(charts.donut) charts.donut.destroy();
  if(charts.bar) charts.bar.destroy();

  charts.donut = new Chart(donutCtx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(dist),
      datasets: [{ data: Object.values(dist), backgroundColor: Object.keys(dist).map(k=>RC[k]), borderMiterLimit:1 }]
    },
    options: { plugins: { legend: { position: 'right', labels: { boxWidth:12, font:{size:11} } } }, maintainAspectRatio: false }
  });

  // Calcul par projet
  let pData = {};
  DATA.projects.forEach(p => pData[p] = { sum:0, count:0 });
  DATA.agents.filter(a=>a.active).forEach(a => {
    const s = a.scores && a.scores[currentMonth];
    if(s) {
      pData[a.proj].sum += sc(s.perf,s.qual,s.pres,s.eng,s.avert);
      pData[a.proj].count++;
    }
  });

  const barLabels = DATA.projects.filter(p => pData[p].count > 0);
  const barValues = barLabels.map(p => Math.round(pData[p].sum / pData[p].count * 10) / 10);

  charts.bar = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: barLabels,
      datasets: [{ label: 'Moyenne', data: barValues, backgroundColor: '#378ADD', borderRadius:4 }]
    },
    options: { 
      scales: { y: { max:100, grid:{display:false}, ticks:{font:{size:10}} }, x:{ ticks:{font:{size:10}} } },
      plugins: { legend: { display:false } },
      maintainAspectRatio: false 
    }
  });
}

function renderAgents() {
  const tbody = document.getElementById('abody');
  if(!tbody) return;

  let html = '';
  const filtered = DATA.agents.filter(a => {
    if(currentFilter === 'ALL') return true;
    const s = a.scores && a.scores[currentMonth];
    if(!s) return false;
    return rank(sc(s.perf,s.qual,s.pres,s.eng,s.avert)) === currentFilter;
  });

  // Tri alphabétique
  filtered.sort((a,b) => a.name.localeCompare(b.name));

  filtered.forEach(a => {
    const s = a.scores && a.scores[currentMonth];
    const val = s ? sc(s.perf,s.qual,s.pres,s.eng,s.avert) : null;
    const r = val !== null ? rank(val) : '—';
    const c = avc(a.name);

    html += `
      <tr>
        <td>
          <div class="nc">
            <div class="av" style="background:${c[0]};color:${c[1]}">${ini(a.name)}</div>
            <div>
              <div style="font-weight:600;color:var(--text);cursor:pointer;text-decoration:underline" onclick="window.openFiche('${a.id}')">${a.name}</div>
              <div style="font-size:11px;color:var(--muted)">ID: ${a.id}</div>
            </div>
          </div>
        </td>
        <td><span class="pill sA" style="background:var(--light);color:var(--text);border:1px solid var(--border)">${a.proj}</span></td>
        <td style="color:var(--muted)">${anciennete(a.dateEntree)}</td>
        <td style="font-weight:700;font-size:15px;color:${val?col(val):'#ccc'}">${val!==null?val:'—'}</td>
        <td>${val!==null?`<span class="pill s${r}">${RL[r]}</span>`:'<span style="color:#ccc">—</span>'}</td>
        <td><span class="${a.active?'badge-ok':'badge-off'}">${a.active?'Actif':'Sorti'}</span></td>
        <td style="text-align:right">
          <button class="abtn" onclick="window.openEdit('${a.id}')">✏️ Edit</button>
        </td>
      </tr>
    `;
  });

  tbody.innerHTML = html || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">Aucun agent trouvé.</td></tr>';
}

function renderScoreGrid() {
  const container = document.getElementById('sgrid');
  const m = document.getElementById('msel')?.value;
  const p = document.getElementById('psel')?.value;
  if(!container || !m || !p) return;

  const isLocked = DATA.archives?.months?.includes(m);
  const list = DATA.agents.filter(a => a.active && a.proj === p).sort((a,b)=>a.name.localeCompare(b.name));

  if(!list.length) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted)">Aucun agent actif positionné sur le projet ${p} pour ce mois.</div>`;
    return;
  }

  let html = `
    ${isLocked ? `<div class="alert-err" style="display:block;margin-bottom:12px">🔒 Ce mois est verrouillé (archivé). Les modifications sont impossibles.</div>` : ''}
    <table class="tbl">
      <thead>
        <tr><th>Agent</th><th>Perf (%)</th><th>Qualité (%)</th><th>Présence (%)</th><th>Engagement (/5)</th><th>Avert.</th><th>Total</th></tr>
      </thead>
      <tbody>`;

  list.forEach(a => {
    const s = (a.scores && a.scores[m]) || {perf:'',qual:'',pres:100,eng:5,avert:0};
    const total = sc(s.perf||0, s.qual||0, s.pres||0, s.eng||0, s.avert||0);
    
    html += `
      <tr data-aid="${a.id}">
        <td style="font-weight:600">${a.name}</td>
        <td><input type="number" class="score-input" data-field="perf" value="${s.perf}" min="0" max="200" ${isLocked?'disabled':''}></td>
        <td><input type="number" class="score-input" data-field="qual" value="${s.qual}" min="0" max="100" ${isLocked?'disabled':''}></td>
        <td><input type="number" class="score-input" data-field="pres" value="${s.pres}" min="0" max="100" ${isLocked?'disabled':''}></td>
        <td>
          <select class="score-select" data-field="eng" ${isLocked?'disabled':''}>
            ${[5,4,3,2,1,0].map(v => `<option value="${v}" ${s.eng==v?'selected':''}>${v}</option>`).join('')}
          </select>
        </td>
        <td><input type="number" class="score-input" data-field="avert" value="${s.avert}" min="0" max="10" ${isLocked?'disabled':''}></td>
        <td style="font-weight:700;font-size:14px;color:${col(total)}" id="total-${a.id}">${total}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;

  // Listeners pour calcul en temps réel
  if(!isLocked) {
    container.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('input', (e) => {
        const tr = e.target.closest('tr');
        const aid = tr.dataset.aid;
        const perf = +tr.querySelector('[data-field="perf"]').value || 0;
        const qual = +tr.querySelector('[data-field="qual"]').value || 0;
        const pres = +tr.querySelector('[data-field="pres"]').value || 0;
        const eng = +tr.querySelector('[data-field="eng"]').value || 0;
        const avert = +tr.querySelector('[data-field="avert"]').value || 0;
        const totalEl = document.getElementById(`total-${aid}`);
        const res = sc(perf, qual, pres, eng, avert);
        if(totalEl) {
          totalEl.textContent = res;
          totalEl.style.color = col(res);
        }
      });
    });
  }
}

window.saveScores = async function() {
  const m = document.getElementById('msel').value;
  if(DATA.archives?.months?.includes(m)) {
    alert("Impossible d'enregistrer, ce mois est verrouillé.");
    return;
  }

  const rows = document.querySelectorAll('#sgrid tbody tr');
  rows.forEach(tr => {
    const aid = tr.dataset.aid;
    const perf = tr.querySelector('[data-field="perf"]').value;
    const qual = tr.querySelector('[data-field="qual"]').value;
    const pres = tr.querySelector('[data-field="pres"]').value;
    const eng = tr.querySelector('[data-field="eng"]').value;
    const avert = tr.querySelector('[data-field="avert"]').value;

    const agent = DATA.agents.find(a => a.id === aid);
    if(agent) {
      if(!agent.scores) agent.scores = {};
      if(perf === '' && qual === '') {
        delete agent.scores[m];
      } else {
        agent.scores[m] = { perf:+perf, qual:+qual, pres:+pres, eng:+eng, avert:+avert };
      }
    }
  });

  await setDoc(REF, DATA);
  alert("Scores enregistrés avec succès !");
};

function renderTrendChart() {
  const canvas = document.getElementById('trendchart');
  if(!canvas) return;
  if(charts.trend) charts.trend.destroy();

  const datasets = DATA.projects.map((proj, idx) => {
    const data = DATA.months.map(m => {
      let sum=0, count=0;
      DATA.agents.filter(a => a.active && a.proj === proj).forEach(a => {
        const s = a.scores && a.scores[m];
        if(s) { sum += sc(s.perf,s.qual,s.pres,s.eng,s.avert); count++; }
      });
      return count ? Math.round(sum/count*10)/10 : null;
    });
    return { label:proj, data, borderColor:PC[idx%PC.length], backgroundColor:'transparent', tension:.1, spanGaps:true };
  });

  charts.trend = new Chart(canvas, {
    type: 'line',
    data: { labels: DATA.months, datasets },
    options: { scales:{ y:{ max:100, min:30 } }, maintainAspectRatio:false }
  });
}

function renderProjets() {
  const tbody = document.getElementById('pbody');
  if(!tbody) return;

  let html = '';
  DATA.projects.forEach(p => {
    const ags = DATA.agents.filter(a => a.active && a.proj === p);
    let sum=0, count=0;
    ags.forEach(a => {
      const s = a.scores && a.scores[currentMonth];
      if(s) { sum += sc(s.perf,s.qual,s.pres,s.eng,s.avert); count++; }
    });
    const avg = count ? Math.round(sum/count*10)/10 : 0;
    const r = count ? rank(avg) : '—';

    html += `
      <tr>
        <td style="font-weight:700">${p}</td>
        <td><span class="badge-ok" style="background:var(--light);color:var(--text)">👥 ${ags.length} agent(s)</span></td>
        <td style="font-weight:700;color:${count?col(avg):'#ccc'}">${count?avg + ' pts':'Aucune donnée'}</td>
        <td>${count ? `<span class="pill s${r}">${RL[r]}</span>` : '—'}</td>
        <td style="text-align:right">
          <button class="abtn red" onclick="window.deleteProj('${p}')">🗑️</button>
        </td>
      </tr>
    `;
  });
  tbody.innerHTML = html;
}

window.renderHist = function() {
  const container = document.getElementById('hist-body');
  const hAg = document.getElementById('hag');
  const hPr = document.getElementById('hpr');
  if(!container || !hAg || !hPr) return;

  // Sync des filtres historique au premier chargement
  if(hAg.options.length <= 1) {
    hAg.innerHTML = '<option value="all">Tous les agents</option>' + DATA.agents.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
    hPr.innerHTML = '<option value="all">Tous les projets</option>' + DATA.projects.map(p=>`<option value="${p}">${p}</option>`).join('');
  }

  const fAg = hAg.value;
  const fPr = hPr.value;

  let rows = [];
  DATA.agents.forEach(a => {
    if(fAg !== 'all' && a.id !== fAg) return;
    DATA.months.forEach(m => {
      const s = a.scores && a.scores[m];
      if(!s) return;
      // On cherche son projet historique pour ce mois ou le projet actuel par défaut
      const projAtMonth = a.proj; 
      if(fPr !== 'all' && projAtMonth !== fPr) return;

      const v = sc(s.perf,s.qual,s.pres,s.eng,s.avert);
      rows.push({ name:a.name, month:m, proj:projAtMonth, perf:s.perf, qual:s.qual, pres:s.pres, eng:s.eng, avert:s.avert, total:v });
    });
  });

  let html = `
    <table class="tbl">
      <thead>
        <tr><th>Agent</th><th>Mois</th><th>Projet</th><th>Perf</th><th>Qualité</th><th>Présence</th><th>Eng.</th><th>Avert.</th><th>Total</th><th>Rang</th></tr>
      </thead>
      <tbody>`;
  
  rows.forEach(r => {
    html += `
      <tr>
        <td style="font-weight:600">${r.name}</td>
        <td><strong>${r.month}</strong></td>
        <td>${r.proj}</td>
        <td>${r.perf}%</td>
        <td>${r.qual}%</td>
        <td>${r.pres}%</td>
        <td>${r.eng}/5</td>
        <td><span style="color:${r.avert>0?'var(--red)':'inherit'}">${r.avert}</span></td>
        <td style="font-weight:700;color:${col(r.total)}">${r.total}</td>
        <td><span class="pill s${rank(r.total)}">${rank(r.total)}</span></td>
      </tr>`;
  });
  html += `</tbody></table>`;
  container.innerHTML = rows.length ? html : '<div style="padding:20px;color:var(--muted)">Aucun historique correspondant.</div>';
};

function renderCalendar() {
  const up = document.getElementById('cal-upcoming');
  const past = document.getElementById('cal-past');
  if(!up || !past) return;

  const now = new Date();
  const sorted = [...DATA.calendar].sort((a,b) => new Date(a.date) - new Date(b.date));

  let upHtml = '', pastHtml = '';
  sorted.forEach(ev => {
    const evDate = new Date(ev.date);
    const isPast = evDate < now && evDate.toDateString() !== now.toDateString();
    const typeLabel = ev.type === 'initiale' ? '🟢 Initiale' : ev.type === 'suivi' ? '🔵 Suivi' : '🟠 Débrief';
    const h = `
      <div class="cal-event ${isPast?'past':(evDate.toDateString()===now.toDateString()?'today':'upcoming')}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="cal-event-title">${ev.agentName} — <span style="font-size:11px;color:var(--muted)">${typeLabel}</span></div>
          <button class="comment-del" onclick="window.deleteCalendarEvent('${ev.id}')">×</button>
        </div>
        <div class="cal-event-meta">📅 ${ev.date} à ${ev.time} | Salon/Lien: ${ev.room || 'Non spécifié'}</div>
        ${ev.notes ? `<div style="font-size:11px;color:var(--text);margin-top:4px;background:rgba(0,0,0,0.02);padding:4px;border-radius:4px">📝 ${ev.notes}</div>` : ''}
      </div>
    `;
    if(isPast) pastHtml += h; else upHtml += h;
  });

  up.innerHTML = upHtml || '<div style="color:var(--muted);font-size:13px">Aucune évaluation planifiée.</div>';
  past.innerHTML = pastHtml || '<div style="color:var(--muted);font-size:13px">Aucun historique d\'évaluation.</div>';
}

window.openFiche = function(id) {

  const value = s ? sc(s.perf,s.qual,s.pres,s.eng,s.avert) : null;
  const r = value!==null ? rank(value) : '—';
  const c = avc(a.name);

  // Historique des scores pour les graphiques de la fiche
  const monthsWithScore = DATA.months.filter(m => a.scores && a.scores[m]);
  const scoreValues = monthsWithScore.map(m => sc(a.scores[m].perf, a.scores[m].qual, a.scores[m].pres, a.scores[m].eng, a.scores[m].avert));

  // Liste des commentaires
  const coms = DATA.comments?.[id] || [];
  const commentsHtml = coms.map((co, idx) => `
    <div class="comment-item">
      <div class="comment-header">
        <span class="comment-author">👤 ${co.author}</span>
        <div>

      </div>

    <div class="fiche-header">
      <div class="fiche-av" style="background:${c[0]};color:${c[1]}">${ini(a.name)}</div>
      <div>
        <div class="fiche-name">${a.name}</div>
        <div class="fiche-sub">Projet actuel : <strong>${a.proj}</strong> | Ancienneté : ${anciennete(a.dateEntree)}</div>
      </div>
    </div>
    
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-box-label">Score ${currentMonth}</div><div class="stat-box-val" style="color:${value?col(value):'inherit'}">${value!==null?value:'—'} pts</div></div>
      <div class="stat-box"><div class="stat-box-label">Rang attribué</div><div class="stat-box-val">${value!==null?RL[r]:'—'}</div></div>
    </div>

    <div class="stitle">📋 Détail des indicateurs (${currentMonth})</div>
    <table class="tbl" style="margin-bottom:16px">
      <tr><td>📈 Performance Quantitative (Ventes/Objectifs)</td><td style="font-weight:700;text-align:right">${s?.perf!==undefined?s.perf+'%':'—'}</td></tr>
      <tr><td>⭐ Qualité & Conformité des appels</td><td style="font-weight:700;text-align:right">${s?.qual!==undefined?s.qual+'%':'—'}</td></tr>
      <tr><td>📅 Assiduité & Présence sur site</td><td style="font-weight:700;text-align:right">${s?.pres!==undefined?s.pres+'%':'—'}</td></tr>
      <tr><td>🤝 Engagement, Posture & Esprit d'équipe</td><td style="font-weight:700;text-align:right">${s?.eng!==undefined?s.eng+'/5':'—'}</td></tr>
      <tr><td>⚠️ Mesures disciplinaires / Avertissements</td><td style="font-weight:700;text-align:right;color:${s?.avert>0?'var(--red)':'inherit'}">${s?.avert||0}</td></tr>
    </table>

    <div class="stitle">🕒 Historique d'évolution des scores</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">
      ${monthsWithScore.map((m,i)=>`<strong>${m}</strong>: ${scoreValues[i]} pts (${rank(scoreValues[i])})`).join(' ➔ ') || 'Aucun historique.'}
    </div>

    <div class="divider"></div>
    <div class="stitle">💬 Évaluations qualitatives & Coaching (${coms.length})</div>
    <div id="comments-container" style="max-height:160px;overflow-y:auto;margin-bottom:12px">${commentsHtml || '<div style="color:var(--muted);font-size:12px">Aucun commentaire de coaching.</div>'}</div>

  if(!confirm("Annuler ou supprimer cette évaluation planifiée ?")) return;
  DATA.calendar = DATA.calendar.filter(ev => ev.id !== id);
  await setDoc(REF, DATA);
};

window.toggleLockMonth = async function(m) {
  if(!DATA.archives.months) DATA.archives.months = [];
  if(DATA.archives.months.includes(m)) {
    DATA.archives.months = DATA.archives.months.filter(x => x !== m);
  } else {
    DATA.archives.months.push(m);
  }
  await setDoc(REF, DATA);
};

window.takeSnap = async function() {
  if(!DATA.archives.snapshots) DATA.archives.snapshots = [];
  const now = new Date();
  const snap = {
    id: uid(),
    timestamp: now.toLocaleDateString('fr-FR') + ' à ' + now.toLocaleTimeString('fr-FR'),
    agentsCount: DATA.agents.length,
    frozenData: JSON.parse(JSON.stringify(DATA.agents))
  };
  DATA.archives.snapshots.push(snap);
  await setDoc(REF, DATA);
  alert("Snapshot d'archive créée avec succès.");
};

window.restoreSnap = async function(id) {
  const snap = DATA.archives?.snapshots?.find(s=>s.id===id);
  if(!snap) return;
  if(!confirm(`Restaurer les données agents de la snapshot du ${snap.timestamp} ? Les affectations actuelles seront écrasées.`)) return;
  DATA.agents = JSON.parse(JSON.stringify(snap.frozenData));
  await setDoc(REF, DATA);
  alert("Données restaurées !");
};

// EXPORT PDF COMPLET DE L'ANALYSE
window._exportPDF = function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  doc.setFillColor(26,26,24); doc.rect(0,0,210,35,'F');
  doc.setTextColor(255,255,255); doc.setFont("Helvetica","bold"); doc.setFontSize(22); doc.text("ALTIUS Contact",14,18);
  doc.setFont("Helvetica","normal"); doc.setFontSize(10); doc.setFillColor(245,200,0); doc.setTextColor(26,26,24); doc.text(` RAPPORT DE PERFORMANCE MENSUEL — ${currentMonth} `,14,26);
  
  doc.setTextColor(50,50,50); doc.setFontSize(10); doc.text(`Édité le : ${new Date().toLocaleDateString('fr-FR')}`, 155, 26);
  
  let y = 48;
  doc.setFont("Helvetica","bold"); doc.setFontSize(14); doc.text("1. Synthèse globale de l'activité", 14, y);
  y += 8;

  let totalScore=0, count=0;
  DATA.agents.filter(a=>a.active).forEach(a=>{
    const s = a.scores && a.scores[currentMonth];
    if(s){ totalScore += sc(s.perf,s.qual,s.pres,s.eng,s.avert); count++; }
  });
  const avg = count ? Math.round(totalScore/count*10)/10 : 0;

  doc.setFont("Helvetica","normal"); doc.setFontSize(11);
  doc.text(`• Mois analysé : ${currentMonth}`, 16, y); y+=6;
  doc.text(`• Nombre d'agents sous contrat actif : ${DATA.agents.filter(a=>a.active).length}`, 16, y); y+=6;
  doc.text(`• Moyenne générale constatée : ${avg} / 100`, 16, y); y+=10;

  doc.setFont("Helvetica","bold"); doc.setFontSize(14); doc.text("2. Classement détaillé des conseillers commerciaux", 14, y);
  y += 4;

  const tableBody = DATA.agents.filter(a=>a.active).map(a => {
    const s = a.scores && a.scores[currentMonth];
    const val = s ? sc(s.perf,s.qual,s.pres,s.eng,s.avert) : null;
    return [a.name, a.proj, anciennete(a.dateEntree), val!==null?val+' pts':'—', val!==null?rank(val):'—'];
  }).sort((a,b) => (parseFloat(b[3])||0) - (parseFloat(a[3])||0));

  doc.autoTable({
    startY: y,
    head: [['Conseiller', 'Projet Affecté', 'Ancienneté', 'Score Global', 'Rang']],
    body: tableBody,
    headStyles: { fillColor: [26,26,24] },
    theme: 'striped',
    styles: { fontSize: 9 }
  });

  doc.save(`ALTIUS-Performance-Sales-${currentMonth}.pdf`);
};
</script>
